name: Calories

# Чтобы файлы конфигурации/плиста были видны в Xcode Navigator
fileGroups:
  - Config.xcconfig
  - Info.plist
  - project.yml
  - PreviewContent

options:
  bundleIdPrefix: dev.calories
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

configs:
  Debug: debug
  Release: release

# Подключаем xcconfig как Base Configuration для каждой конфигурации.
# (xcodegen использует ключ `configFiles`, а не `baseConfiguration`)
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.calories.calories
    SWIFT_VERSION: "5.0"
    INFOPLIST_FILE: Info.plist
    DEVELOPMENT_ASSET_PATHS: "PreviewContent"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Calories:
    type: application
    platform: iOS
    sources:
      - path: Sources/Calories
      - path: Assets.xcassets
    # PreviewContent не включаем в build resources, только для SwiftUI Previews
    scheme:
      testTargets: []
      gatherCoverageData: false
